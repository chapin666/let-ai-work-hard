name: Security Pipeline

on: [push, pull_request]

jobs:
  # 1. 依赖安全扫描
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Snyk scan
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high --json-file-output=snyk.json
      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: snyk-report
          path: snyk.json

  # 2. 静态代码分析
  sast-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
            p/javascript

  # 3. AI辅助代码审计
  ai-security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: AI Security Audit
        run: |
          node scripts/ai-security-audit.js \
            --files "src/**/*.js" \
            --output security-report.json
      - name: Check risk score
        run: |
          SCORE=$(cat security-report.json | jq '.overallRiskScore')
          if [ $SCORE -gt 7 ]; then
            echo "❌ Security risk too high: $SCORE/10"
            exit 1
          fi

  # 4. 动态应用安全测试（DAST）
  dast-scan:
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-scan]
    steps:
      - name: Deploy to staging
        run: |
          # 部署到测试环境
          ./deploy-staging.sh
      - name: OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: 'https://staging.example.com'
          rules_file_name: '.zap/rules.tsv'

  # 5. 生成安全报告
  security-report:
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-scan, ai-security-audit, dast-scan]
    steps:
      - name: Aggregate reports
        run: |
          node scripts/generate-security-report.js \
            --snyk snyk.json \
            --semgrep semgrep.json \
            --ai-audit security-report.json \
            --zap zap-report.json \
            --output final-report.md
      - name: Comment on PR
        uses: actions/github-script@v6
        with:
          script: |
            const report = require('fs').readFileSync('final-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
