# Lines: 104-135
# Language: yaml

# 基础配置
name: "小林的AI助手"
model:
  provider: openai
  model: gpt-4
  temperature: 0.7

# 记忆配置
memory:
  type: sqlite
  path: ~/.openclaw/memory.db

# 工具配置
tools:
  - name: email
    config:
      imap_server: imap.gmail.com
      smtp_server: smtp.gmail.com
      username: ${EMAIL_USER}
      password: ${EMAIL_PASS}
  
  - name: calendar
    config:
      provider: google
      credentials: ~/.openclaw/calendar_creds.json
  
  - name: github
    config:
      token: ${GITHUB_TOKEN}
      default_repo: mycompany/project
