# .github/workflows/sql-review.yml
name: SQL Review

on:
  pull_request:
    paths:
      - '**/*.sql'
      - '**/migrations/**'

jobs:
  sql-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Extract SQL changes
        run: |
          git diff HEAD~1 -- '*.sql' > sql_changes.sql
      
      - name: AI SQL Review
        run: |
          node scripts/ai-sql-review.js sql_changes.sql
      
