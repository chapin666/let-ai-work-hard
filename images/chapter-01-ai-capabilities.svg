<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500">
  <!-- 背景 -->
  <rect width="700" height="500" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="350" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#333">AI能力边界：能做什么 vs 不能做什么</text>
  
  <!-- 左侧：擅长的事情 -->
  <rect x="40" y="70" width="300" height="380" rx="12" fill="#fff" stroke="#4caf50" stroke-width="2"/>
  <text x="190" y="105" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="600" fill="#4caf50">✅ AI擅长</text>
  
  <!-- 列表项 -->
  <g transform="translate(60, 130)" font-family="system-ui" font-size="13">
    <!-- 写重复代码 -->
    <rect x="0" y="0" width="260" height="55" rx="8" fill="#e8f5e9"/>
    <text x="15" y="22" font-weight="600" fill="#2e7d32">写重复代码</text>
    <text x="15" y="42" font-size="11" fill="#558b2f">正则、CRUD、工具函数、配置</text>
    
    <!-- 解释复杂代码 -->
    <rect x="0" y="70" width="260" height="55" rx="8" fill="#e8f5e9"/>
    <text x="15" y="92" font-weight="600" fill="#2e7d32">解释复杂代码</text>
    <text x="15" y="112" font-size="11" fill="#558b2f">开源项目、遗留代码、算法</text>
    
    <!-- 排查问题 -->
    <rect x="0" y="140" width="260" height="55" rx="8" fill="#e8f5e9"/>
    <text x="15" y="162" font-weight="600" fill="#2e7d32">排查问题</text>
    <text x="15" y="182" font-size="11" fill="#558b2f">报错分析、性能优化方向</text>
    
    <!-- 学习新技术 -->
    <rect x="0" y="210" width="260" height="55" rx="8" fill="#e8f5e9"/>
    <text x="15" y="232" font-weight="600" fill="#2e7d32">学习新技术</text>
    <text x="15" y="252" font-size="11" fill="#558b2f">新框架、概念解释、类比</text>
    
    <!-- 写文档邮件 -->
    <rect x="0" y="280" width="260" height="55" rx="8" fill="#e8f5e9"/>
    <text x="15" y="302" font-weight="600" fill="#2e7d32">写文档和邮件</text>
    <text x="15" y="322" font-size="11" fill="#558b2f">技术方案、工作汇报、邮件</text>
  </g>
  
  <!-- 效果标签 -->
  <rect x="90" y="415" width="200" height="28" rx="14" fill="#4caf50"/>
  <text x="190" y="433" text-anchor="middle" font-family="system-ui" font-size="12" fill="#fff">效率提升 50%-80%</text>
  
  <!-- 右侧：不擅长的事情 -->
  <rect x="360" y="70" width="300" height="380" rx="12" fill="#fff" stroke="#f44336" stroke-width="2"/>
  <text x="510" y="105" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="600" fill="#f44336">❌ AI不擅长</text>
  
  <!-- 列表项 -->
  <g transform="translate(380, 130)" font-family="system-ui" font-size="13">
    <!-- 理解业务 -->
    <rect x="0" y="0" width="260" height="55" rx="8" fill="#ffebee"/>
    <text x="15" y="22" font-weight="600" fill="#c62828">理解业务规则</text>
    <text x="15" y="42" font-size="11" fill="#d32f2f">不知道你的用户、场景、约束</text>
    
    <!-- 保证安全 -->
    <rect x="0" y="70" width="260" height="55" rx="8" fill="#ffebee"/>
    <text x="15" y="92" font-weight="600" fill="#c62828">保证代码安全</text>
    <text x="15" y="112" font-size="11" fill="#d32f2f">可能有SQL注入、XSS等漏洞</text>
    
    <!-- 架构设计 -->
    <rect x="0" y="140" width="260" height="55" rx="8" fill="#ffebee"/>
    <text x="15" y="162" font-weight="600" fill="#c62828">做架构决策</text>
    <text x="15" y="182" font-size="11" fill="#d32f2f">只能给通用方案，不创新</text>
    
    <!-- 替你负责 -->
    <rect x="0" y="210" width="260" height="55" rx="8" fill="#ffebee"/>
    <text x="15" y="232" font-weight="600" fill="#c62828">替你承担责任</text>
    <text x="15" y="252" font-size="11" fill="#d32f2f">代码是你提交的，bug是你的</text>
    
    <!-- 知道边界 -->
    <rect x="0" y="280" width="260" height="55" rx="8" fill="#ffebee"/>
    <text x="15" y="302" font-weight="600" fill="#c62828">知道自己的局限</text>
    <text x="15" y="322" font-size="11" fill="#d32f2f">会"幻觉"，编造不存在的信息</text>
  </g>
  
  <!-- 风险标签 -->
  <rect x="410" y="415" width="200" height="28" rx="14" fill="#f44336"/>
  <text x="510" y="433" text-anchor="middle" font-family="system-ui" font-size="12" fill="#fff">⚠️ 需要人工审查</text>
  
  <!-- 底部提示 -->
  <rect x="150" y="470" width="400" height="24" rx="12" fill="#fff9c4" stroke="#fbc02d" stroke-width="1"/>
  <text x="350" y="487" text-anchor="middle" font-family="system-ui" font-size="12" fill="#f57f17">💡 正确使用：让AI做它擅长的，你做你擅长的；AI是助手，不是替代品</text>
</svg>
