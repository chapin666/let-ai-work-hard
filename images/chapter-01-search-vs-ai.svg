<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- 背景 -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#333">传统搜索 vs AI对话</text>
  
  <!-- 左侧：传统搜索 -->
  <rect x="50" y="70" width="320" height="280" rx="12" fill="#fff" stroke="#e0e0e0" stroke-width="2"/>
  <text x="210" y="105" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="600" fill="#666">传统搜索引擎</text>
  
  <!-- 搜索步骤 -->
  <g transform="translate(80, 130)">
    <!-- 步骤1 -->
    <rect x="0" y="0" width="260" height="40" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="130" y="26" text-anchor="middle" font-family="system-ui" font-size="13" fill="#e65100">输入关键词</text>
    
    <!-- 箭头 -->
    <path d="M130 45 L130 55" stroke="#ccc" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- 步骤2 -->
    <rect x="0" y="60" width="260" height="40" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="130" y="86" text-anchor="middle" font-family="system-ui" font-size="13" fill="#e65100">查看10个链接</text>
    
    <!-- 箭头 -->
    <path d="M130 105 L130 115" stroke="#ccc" stroke-width="2"/>
    
    <!-- 步骤3 -->
    <rect x="0" y="120" width="260" height="40" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="130" y="146" text-anchor="middle" font-family="system-ui" font-size="13" fill="#e65100">逐一打开筛选</text>
    
    <!-- 箭头 -->
    <path d="M130 165 L130 175" stroke="#ccc" stroke-width="2"/>
    
    <!-- 步骤4 -->
    <rect x="0" y="180" width="260" height="40" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="130" y="206" text-anchor="middle" font-family="system-ui" font-size="13" fill="#e65100">手动拼凑答案</text>
  </g>
  
  <!-- 耗时 -->
  <text x="210" y="350" text-anchor="middle" font-family="system-ui" font-size="14" fill="#999">⏱️ 平均耗时：10-30分钟</text>
  
  <!-- 右侧：AI对话 -->
  <rect x="430" y="70" width="320" height="280" rx="12" fill="#fff" stroke="#e0e0e0" stroke-width="2"/>
  <text x="590" y="105" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="600" fill="#2196f3">AI对话</text>
  
  <!-- AI步骤 -->
  <g transform="translate(460, 130)">
    <!-- 步骤1 -->
    <rect x="0" y="0" width="260" height="40" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="1.5"/>
    <text x="130" y="26" text-anchor="middle" font-family="system-ui" font-size="13" fill="#1565c0">用自然语言描述需求</text>
    
    <!-- 箭头 -->
    <path d="M130 45 L130 55" stroke="#2196f3" stroke-width="2"/>
    
    <!-- 步骤2 -->
    <rect x="0" y="60" width="260" height="100" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
    <text x="130" y="86" text-anchor="middle" font-family="system-ui" font-size="13" fill="#2e7d32" font-weight="500">直接获得完整答案</text>
    <text x="130" y="110" text-anchor="middle" font-family="system-ui" font-size="11" fill="#558b2f">✓ 代码</text>
    <text x="130" y="128" text-anchor="middle" font-family="system-ui" font-size="11" fill="#558b2f">✓ 解释</text>
    <text x="130" y="146" text-anchor="middle" font-family="system-ui" font-size="11" fill="#558b2f">✓ 测试用例</text>
    
    <!-- 箭头 -->
    <path d="M130 165 L130 175" stroke="#4caf50" stroke-width="2"/>
    
    <!-- 步骤3 -->
    <rect x="0" y="180" width="260" height="40" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="1.5"/>
    <text x="130" y="206" text-anchor="middle" font-family="system-ui" font-size="13" fill="#1565c0">如需调整，继续对话</text>
  </g>
  
  <!-- 耗时 -->
  <text x="590" y="350" text-anchor="middle" font-family="system-ui" font-size="14" fill="#4caf50">⚡ 平均耗时：10-30秒</text>
  
  <!-- 中间对比符号 -->
  <circle cx="400" cy="200" r="25" fill="#f5f5f5" stroke="#ddd" stroke-width="2"/>
  <text x="400" y="208" text-anchor="middle" font-family="system-ui" font-size="20" fill="#666">VS</text>
</svg>
